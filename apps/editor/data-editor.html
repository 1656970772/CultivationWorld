<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天机阁数据编辑器 — 玄天大陆</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/data-editor.css">
</head>
<body>
  <div class="editor-shell">
    <header class="topbar">
      <div class="brand-block">
        <span class="brand-seal">天机</span>
        <div>
          <h1>玄天大陆数据编辑器</h1>
          <p id="source-label">默认 data 目录</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="toolbar-btn" id="pick-dir-btn" type="button">打开项目</button>
        <button class="toolbar-btn" id="reload-btn" type="button">重载</button>
        <button class="toolbar-btn primary" id="save-dataset-btn" type="button">保存当前</button>
        <button class="toolbar-btn primary" id="save-all-btn" type="button">保存全部</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="dataset-panel" aria-label="数据集导航">
        <div class="panel-title">卷宗</div>
        <nav id="dataset-nav" class="dataset-nav"></nav>
      </aside>

      <section class="record-panel" aria-label="记录列表">
        <div class="record-tools">
          <input id="record-search" class="search-input" type="search" placeholder="搜索记录">
          <div class="record-actions">
            <button class="small-btn" id="add-record-btn" type="button">新增</button>
            <button class="small-btn" id="duplicate-record-btn" type="button">复制</button>
            <button class="small-btn danger" id="delete-record-btn" type="button">删除</button>
          </div>
        </div>
        <div id="record-list" class="record-list"></div>
      </section>

      <section class="form-panel" aria-label="表单编辑">
        <div class="form-heading">
          <div>
            <span id="dataset-kicker" class="kicker">数据集</span>
            <h2 id="record-title">加载中</h2>
            <p id="record-subtitle"></p>
          </div>
          <div id="dirty-indicator" class="dirty-indicator">未修改</div>
        </div>
        <div id="form-fields" class="form-fields"></div>
      </section>

      <aside class="detail-card-panel" aria-label="详情卡预留区">
        <section id="detail-card" class="detail-card"></section>

        <!-- ADR-031：历史快照面板 -->
        <section id="history-panel" class="history-panel" aria-label="历史快照">
          <header class="history-header">
            <button id="history-toggle" type="button" class="history-toggle" aria-label="折叠/展开">▼</button>
            <h3>历史快照 (<span id="snapshot-count">0</span>)</h3>
            <button id="prune-old-btn" type="button" class="secondary-btn compact" title="清空 30 天前的快照">清理</button>
          </header>
          <div id="history-list" class="history-list"></div>
          <p class="history-hint">每次保存前自动备份。点「恢复此版本」会先把当前内容再备份一次再恢复（不丢中间态）。</p>
        </section>
      </aside>
    </main>
  </div>

  <div id="toast-region" class="toast-region" aria-live="polite"></div>

  <script type="module" src="js/editor/editor-app.js"></script>
</body>
</html>
