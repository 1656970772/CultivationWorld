<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玄天大陆 — 修仙世界模拟器</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-container">
    <div id="status-bar"></div>
    <div id="minimap-container"></div>
    <div id="map-legend"></div>
    <div id="log-panel"></div>
    <div id="debug-panel" style="display: none;"></div>
    <div id="event-dialog" style="display: none;"></div>
    <div id="save-panel" style="display: none;"></div>
    <div class="action-bar">
      <button class="action-btn" id="btn-meditate">打坐</button>
      <button class="action-btn" id="btn-save">存档</button>
      <button class="action-btn" id="btn-debug">调试</button>
      <button class="action-btn" id="btn-graph">图谱</button>
    </div>
  </div>

  <div id="graph-panel" style="display: none;"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
